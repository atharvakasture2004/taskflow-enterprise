spring.application.name=gateway-service

server.port=8080

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://user-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://user-service:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/users,/users/**

spring.cloud.gateway.routes[2].id=project-service
spring.cloud.gateway.routes[2].uri=http://project-service:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/projects,/projects/**