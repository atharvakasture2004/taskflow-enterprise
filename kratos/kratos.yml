version: v1.3.0

dsn: postgres://kratos:kratos@postgres-kratos:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true

  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: http://localhost:8080

  allowed_return_urls:
    - http://localhost:8080

  methods:
    password:
      enabled: true

  flows:
    login:
      ui_url: http://localhost:8080/login

    registration:
      ui_url: http://localhost:8080/register

identity:
  default_schema_id: default

  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

secrets:
  cookie:
    - "PLEASE-CHANGE-ME-COOKIE-SECRET-1234567890"

  cipher:
    - "12345678901234567890123456789012"